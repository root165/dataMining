<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <title>数据挖掘真题练习</title>
  <style>
    :root {
      --ink: #162033;
      --muted: #65758b;
      --line: #d8e2ee;
      --bg: #f5f7fb;
      --panel: #fff;
      --blue: #2563eb;
      --green: #166534;
      --red: #b91c1c;
      --amber: #a16207;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.65;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(255,255,255,.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    .bar, main { max-width: 1040px; margin: 0 auto; }
    .bar {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 22px; }
    main { padding: 18px 18px 42px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
    }
    button.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .summary div, section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .summary div { padding: 10px; text-align: center; }
    .summary strong { display: block; font-size: 22px; }
    section { padding: 18px; margin-bottom: 16px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    .question { padding: 14px 0; border-top: 1px solid var(--line); }
    .question:first-of-type { border-top: 0; padding-top: 0; }
    .q-title { font-weight: 700; margin-bottom: 8px; }
    .q-title small { color: var(--muted); font-weight: 400; }
    label {
      display: block;
      padding: 6px 8px;
      border-radius: 6px;
    }
    label:hover { background: #eef4ff; }
    input[type="text"], textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      font: inherit;
      background: #fff;
    }
    textarea { min-height: 132px; resize: vertical; }
    .feedback {
      display: none;
      margin-top: 10px;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
    }
    .feedback strong { color: inherit; }
    .ok { display: block; background: #ecfdf3; color: var(--green); }
    .bad { display: block; background: #fef2f2; color: var(--red); }
    .warn { display: block; background: #fff7ed; color: var(--amber); }
    .explain {
      margin-top: 7px;
      color: #243044;
    }
    .explain ul { margin: 6px 0 0 18px; padding: 0; }
    .note { color: var(--muted); font-size: 14px; margin: 0 0 12px; }
    @media (max-width: 720px) {
      .summary { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

  <header>
    <div class="bar">
      <h1>数据挖掘真题练习</h1>
      <div class="actions">
        <button class="primary" id="gradeBtn">交卷纠错</button>

        <button id="resetBtn">清空作答</button>
      </div>
    </div>
  </header>

      <div id="judge"></div>

      <div id="short"></div>
    </section>

      {n:7, answer:["自助采样","bootstrap采样","bootstrap"], text:"在集成学习中，通过对训练集进行有放回抽样构造多个子训练集的方法称为____。", explain:"Bagging中的训练子集通常由Bootstrap有放回抽样得到。"},
      {n:8, answer:["最小二乘法"], text:"在线性回归中，用于估计模型参数的常见方法是____。", explain:"最小二乘法通过最小化残差平方和求解线性回归参数。"},
      {n:9, answer:["随机梯度下降","sgd"], text:"在神经网络训练中，根据梯度方向逐步调整参数的优化方法称为____。", explain:"随机梯度下降使用样本或小批量样本估计梯度，并沿降低损失的方向更新参数。"},
      {n:10, answer:["投票法","多数投票"], text:"在集成学习中，多个模型对同一样本进行类别投票并确定最终结果的方法称为____。", explain:"分类集成常用投票法，回归集成常用平均法。"}
    ];

    const judges = [
      {n:1, answer:"错", text:"逻辑回归通常用于回归任务。", explain:"虽然名字带“回归”，逻辑回归主要用于分类，尤其是二分类。"},
      {n:2, answer:"对", text:"聚类算法通常不依赖事先给定的类别标签，而是根据样本之间的相似性自动划分数据对象。", explain:"聚类是典型无监督学习，根据相似性或距离形成簇。"},
      {n:3, answer:"对", text:"回归和分类都需要利用已知标签的数据进行模型训练，因此二者都属于有监督学习。", explain:"二者目标变量形式不同：回归预测连续值，分类预测类别。"},
      {n:4, answer:"错", text:"频繁项集一定都要满足强关联规则。", explain:"频繁项集只要求支持度高；强关联规则还要满足置信度等规则评价条件。"},
      {n:5, answer:"错", text:"Z-score标准化会把所有特征值缩放到[0,1]区间内。", explain:"Z-score把数据变为均值0、标准差1；缩放到[0,1]是Min-Max归一化。"},
      {n:6, answer:"对", text:"数据预处理的主要目的之一是提高数据质量，从而提升后续模型训练和分析的效果。", explain:"清洗、集成、变换、规约都服务于提高数据可用性和建模效果。"},
      {n:7, answer:"错", text:"训练集准确率很高而测试集准确率较低，通常说明模型可能存在欠拟合问题。", explain:"这通常是过拟合：模型记住训练集，却泛化不好。欠拟合是训练集和测试集表现都差。"},
      {n:8, answer:"对", text:"皮尔逊相关系数只能衡量变量间的线性相关性。", explain:"皮尔逊相关反映线性关系强弱，非线性相关可能无法被它充分体现。"},
      {n:9, answer:"对", text:"K-means聚类结果可能受初始聚类中心影响。", explain:"不同初始中心可能收敛到不同局部最优，因此常多次初始化。"},
      {n:10, answer:"对", text:"在分类任务中，召回率越高，说明模型将正类样本识别出来的能力越强。", explain:"召回率 = TP / (TP + FN)，衡量实际正类被找回的比例。"}
    ];

    const shorts = [
      {
        n: 1,
        text: "简述K-means聚类算法的基本思想及主要步骤，并说明该算法的优点和局限性。",
        keywords: ["k-means","聚类","中心","距离","分配","更新","迭代","收敛","优点","局限"],
        guide: "可按“思想-步骤-优点-局限”写：先给定K个簇中心，按距离把样本分到最近簇，再用簇内均值更新中心，重复直到中心或目标函数收敛。优点是简单、效率较高、适合球状簇；局限是需预先指定K、对初始中心和异常值敏感，不适合非凸形状或不同密度簇。"
      },
      {
        n: 2,
        text: "什么是数据挖掘？使用数据挖掘发现知识的过程是什么样的，包括哪些重要的步骤？",
        keywords: ["数据挖掘","大量数据","模式","知识","数据选择","预处理","变换","建模","评价","解释"],
        guide: "可先定义：从大量、不完全、含噪、随机的数据中发现潜在有价值模式和知识的过程。步骤可写：明确问题、数据选择、数据预处理、数据变换、挖掘建模、模式评价、知识表示与应用。"
      },
      {
        n: 3,
        text: "数据预处理是数据准备的主要工作。请思考和阐述数据预处理在数据挖掘中所处的地位和所发挥的作用。",
        keywords: ["数据预处理","数据准备","数据质量","清洗","集成","变换","规约","缺失值","异常值","模型效果","挖掘基础"],
        guide: "可强调地位：数据预处理处在原始数据与建模挖掘之间，是数据挖掘成功的基础和前提。作用包括：清洗缺失、噪声、异常和重复数据；集成多源数据；通过标准化、编码、离散化等变换让数据适合算法；通过降维、抽样、特征选择等规约降低复杂度；最终提高数据质量、模型稳定性、准确性和可解释性。"
      }
    ];

    function normalize(s) {
      return (s || "").toString().trim().replace(/\s+/g, "").toLowerCase();
    }
    function choiceQuestion(q) {
      const opts = q.options.map((opt, i) => {
        const value = String.fromCharCode(65 + i);
        return `<label><input type="radio" name="single-${q.n}" value="${value}"> ${value}. ${opt}</label>`;
      }).join("");
      return `<div class="question" data-type="single" data-n="${q.n}">
        <div class="q-title">${q.n}. ${q.text} <small>(${q.score}分)</small></div>
        ${opts}
        <div class="feedback"></div>
      </div>`;
    }
    function blankQuestion(q) {
      return `<div class="question" data-type="blank" data-n="${q.n}">
        <div class="q-title">${q.n}. ${q.text} <small>(2分)</small></div>
        <input type="text" name="blank-${q.n}" autocomplete="off">
        <div class="feedback"></div>
      </div>`;
    }
    function judgeQuestion(q) {
      return `<div class="question" data-type="judge" data-n="${q.n}">
        <div class="q-title">${q.n}. ${q.text} <small>(1分)</small></div>
        <label><input type="radio" name="judge-${q.n}" value="对"> 对</label>
        <label><input type="radio" name="judge-${q.n}" value="错"> 错</label>
        <div class="feedback"></div>
      </div>`;
    }
    function shortQuestion(q) {
      return `<div class="question" data-type="short" data-n="${q.n}">
        <div class="q-title">${q.n}. ${q.text} <small>(10分)</small></div>
        <textarea name="short-${q.n}" placeholder="在这里作答"></textarea>
        <div class="feedback"></div>
      </div>`;
    }
    function setFeedback(el, cls, html) {
      const box = el.querySelector(".feedback");
      box.className = `feedback ${cls}`;
      box.innerHTML = html;
    }
    function optionExplain(q) {
      return `<div class="explain"><strong>为什么选 ${q.answer}：</strong>${q.explain.why}
        <ul>${q.explain.wrong.map(item => `<li>${item}</li>`).join("")}</ul>
      </div>`;
    }
    function grade(revealOnly = false) {
      let score = 0, right = 0, wrong = 0, shortHitTotal = 0;
      single.forEach(q => {
        const el = document.querySelector(`[data-type="single"][data-n="${q.n}"]`);
        const picked = document.querySelector(`input[name="single-${q.n}"]:checked`)?.value || "";
        const ok = picked === q.answer;
        if (ok) { score += q.score; right++; }
        else { wrong++; }
        setFeedback(
          el,
          ok ? "ok" : "bad",
          `<strong>${ok ? "正确" : (revealOnly ? "参考解析" : "错误")}。</strong>正确答案：${q.answer}。你选择：${picked || "未作答"}。${optionExplain(q)}`
        );
      });
      blanks.forEach(q => {
        const el = document.querySelector(`[data-type="blank"][data-n="${q.n}"]`);
        const value = normalize(document.querySelector(`input[name="blank-${q.n}"]`)?.value);
        const ok = q.answer.some(a => normalize(a) === value);
        if (ok) { score += 2; right++; }
        else { wrong++; }
        setFeedback(
          el,
          ok ? "ok" : "bad",
          `<strong>${ok ? "正确" : (revealOnly ? "参考解析" : "待修正")}。</strong>参考答案：${q.answer.join(" / ")}。<div class="explain">${q.explain}</div>`
        );
      });
      judges.forEach(q => {
        const el = document.querySelector(`[data-type="judge"][data-n="${q.n}"]`);
        const picked = document.querySelector(`input[name="judge-${q.n}"]:checked`)?.value || "";
        const ok = picked === q.answer;
        if (ok) { score += 1; right++; }
        else { wrong++; }
        setFeedback(
          el,
          ok ? "ok" : "bad",
          `<strong>${ok ? "正确" : (revealOnly ? "参考解析" : "错误")}。</strong>正确判断：${q.answer}。你选择：${picked || "未作答"}。<div class="explain">${q.explain}</div>`
        );
      });
      shorts.forEach(q => {
        const el = document.querySelector(`[data-type="short"][data-n="${q.n}"]`);
        const value = normalize(document.querySelector(`textarea[name="short-${q.n}"]`)?.value);
        const hits = q.keywords.filter(k => value.includes(normalize(k)));
        shortHitTotal += hits.length;
        const cls = hits.length >= Math.ceil(q.keywords.length * 0.45) ? "ok" : "warn";
        if (cls === "ok") right++; else wrong++;
        setFeedback(
          el,
          cls,
          `<strong>简答题写作反馈。</strong>关键词命中：${hits.length}/${q.keywords.length}。已命中：${hits.length ? hits.join("、") : "暂无"}。<div class="explain"><strong>应该怎么写：</strong>${q.guide}</div>`
        );
      });
      document.querySelector("#score").textContent = score;
      document.querySelector("#right").textContent = right;
      document.querySelector("#wrong").textContent = wrong;
      document.querySelector("#shortHit").textContent = shortHitTotal;
      window.scrollTo({top: 0, behavior: "smooth"});
    }

    document.querySelector("#single").innerHTML = single.map(choiceQuestion).join("");
    document.querySelector("#blank").innerHTML = blanks.map(blankQuestion).join("");
    document.querySelector("#judge").innerHTML = judges.map(judgeQuestion).join("");
    document.querySelector("#short").innerHTML = shorts.map(shortQuestion).join("");
    document.querySelector("#gradeBtn").addEventListener("click", () => grade(false));
    document.querySelector("#revealBtn").addEventListener("click", () => grade(true));
    document.querySelector("#resetBtn").addEventListener("click", () => {
      document.querySelectorAll("input, textarea").forEach(el => {
        if (el.type === "radio") el.checked = false;
        else el.value = "";
      });
      document.querySelectorAll(".feedback").forEach(el => { el.className = "feedback"; el.textContent = ""; });
      document.querySelector("#score").textContent = "0";
      document.querySelector("#right").textContent = "0";
      document.querySelector("#wrong").textContent = "0";
      document.querySelector("#shortHit").textContent = "0";
    });
  </script>
</body>
</html>
