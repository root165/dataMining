<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据挖掘期末模拟真题</title>
  <style>
    body { margin:0; font-family:"Microsoft YaHei",Arial,sans-serif; background:#f5f7fb; color:#172033; line-height:1.65; }
    header { position:sticky; top:0; background:rgba(255,255,255,.96); border-bottom:1px solid #d8e2ee; }
    .bar, main { max-width:1040px; margin:0 auto; }
    .bar { padding:14px 18px; display:flex; gap:12px; justify-content:space-between; align-items:center; flex-wrap:wrap; }
    h1 { margin:0; font-size:22px; } main { padding:18px 18px 42px; }
    button { border:1px solid #d8e2ee; background:#fff; border-radius:6px; padding:8px 12px; cursor:pointer; font:inherit; }
    button.primary { background:#2563eb; color:#fff; border-color:#2563eb; }
    section,.score div { background:#fff; border:1px solid #d8e2ee; border-radius:8px; }
    section { padding:18px; margin-bottom:16px; } h2 { margin:0 0 12px; font-size:18px; }
    .score { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
    .score div { text-align:center; padding:10px; } .score strong { display:block; font-size:22px; }
    .q { padding:14px 0; border-top:1px solid #d8e2ee; } .q:first-child { border-top:0; padding-top:0; }
    .qt { font-weight:700; margin-bottom:8px; } label { display:block; padding:6px 8px; border-radius:6px; }
    label:hover { background:#eef4ff; } input[type=text],textarea { width:100%; box-sizing:border-box; border:1px solid #d8e2ee; border-radius:6px; padding:9px 10px; font:inherit; }
    textarea { min-height:130px; resize:vertical; }
    .fb { display:none; margin-top:10px; border-radius:6px; padding:10px 12px; font-size:14px; }
    .ok { display:block; background:#ecfdf3; color:#166534; } .bad { display:block; background:#fef2f2; color:#b91c1c; } .warn { display:block; background:#fff7ed; color:#92400e; }
    .note { color:#64748b; }
  </style>
</head>
<body>
<header><div class="bar"><h1>数据挖掘期末模拟真题</h1><div><button class="primary" onclick="grade()">交卷纠错</button> <button onclick="reveal()">显示答案</button> <button onclick="location.reload()">清空</button></div></div></header>
<main>
  <div class="score"><div><strong id="score">0</strong>客观题得分</div><div><strong id="right">0</strong>正确</div><div><strong id="wrong">0</strong>待改</div></div>
  <p class="note">本模拟题重点贴合复习提纲：数据分析与数据挖掘、数据预处理、离散化、关联规则、分类、聚类和评价指标。</p>
  <section><h2>一、单选题</h2><div id="single"></div></section>
  <section><h2>二、填空题</h2><div id="blank"></div></section>
  <section><h2>三、判断题</h2><div id="judge"></div></section>
  <section><h2>四、简答题</h2><div id="short"></div></section>
</main>
<script>
const data = {"single": [["数据挖掘与传统数据分析相比，更强调（ ）。", ["用人工报表总结已知指标", "从大量复杂数据中自动发现潜在规律", "只计算平均数和方差", "只处理小规模结构化数据"], "B"], ["OLAP中的“钻取”通常指（ ）。", ["从细粒度汇总到粗粒度", "改变维度的显示方向", "从汇总层逐步查看更细层次数据", "删除异常数据"], "C"], ["下列属于数据清洗任务的是（ ）。", ["PCA降维", "处理缺失值和异常值", "使用K-means聚类", "计算分类准确率"], "B"], ["把连续年龄划分为青年、中年、老年，属于（ ）。", ["离散化", "数据集成", "模型评价", "反向传播"], "A"], ["Min-Max归一化的主要作用是（ ）。", ["把数据转为均值0方差1", "把数据缩放到指定区间", "删除重复记录", "生成关联规则"], "B"], ["关联规则 A=>B 的置信度表示（ ）。", ["A和B同时出现占全部事务的比例", "包含A的事务中也包含B的比例", "B出现的总次数", "A和B之间的欧氏距离"], "B"], ["Apriori算法能够剪枝的理论基础是（ ）。", ["最大间隔原理", "频繁项集的子集必频繁", "梯度下降法", "贝叶斯公式"], "B"], ["CART分类树常用的划分指标是（ ）。", ["基尼指数", "均方误差", "曼哈顿距离", "召回率"], "A"], ["KNN算法对特征量纲敏感，是因为它主要依赖（ ）。", ["概率分布", "距离计算", "树结构剪枝", "核函数映射"], "B"], ["逻辑回归通常用于（ ）。", ["聚类任务", "分类任务", "关联规则挖掘", "数据压缩"], "B"], ["SVM在线性可分情况下寻找的是（ ）。", ["方差最大的主成分", "支持度最高的项集", "分类间隔最大的超平面", "距离最近的K个样本"], "C"], ["神经网络中反向传播的主要作用是（ ）。", ["计算参数梯度", "生成训练标签", "删除异常值", "进行数据集成"], "A"], ["L2正则化的主要作用是（ ）。", ["扩大参数值", "限制参数过大，缓解过拟合", "把连续变量离散化", "提高训练集记忆能力"], "B"], ["PCA主要用于（ ）。", ["降维和数据规约", "生成分类标签", "计算置信度", "有放回抽样"], "A"], ["K-means聚类结果可能受（ ）影响。", ["初始聚类中心", "样本标签名称", "网页编码", "分类阈值固定为0.5"], "A"], ["DBSCAN相比K-means的一个特点是（ ）。", ["必须指定簇数K", "只能发现球状簇", "能识别噪声点并发现任意形状簇", "只能用于回归"], "C"], ["训练集准确率很高而测试集准确率低，通常说明（ ）。", ["欠拟合", "过拟合", "数据集成", "无监督学习"], "B"], ["F1值综合考虑的是（ ）。", ["支持度和置信度", "精确率和召回率", "均值和方差", "欧氏距离和曼哈顿距离"], "B"], ["Bagging通过多个模型投票或平均，主要用于降低（ ）。", ["模型方差", "样本数量", "数据维度必为1", "标签个数"], "A"], ["数据预处理在数据挖掘流程中的地位是（ ）。", ["可有可无", "只在模型评价后进行", "建模前提高数据质量的基础环节", "只用于画图"], "C"]], "blank": [["数据挖掘常被定义为从大量、不完全、有噪声、模糊、随机的数据中发现潜在有用的____。", "知识"], ["数据预处理主要包括数据清洗、数据集成、数据变换和____。", "数据规约"], ["实际为正例但被预测为负例的样本称为____。", "假负例"], ["分类评价中，____用于衡量实际正类被识别出来的比例。", "召回率"], ["K-means每轮迭代通常包括样本分配和____两个步骤。", "中心更新"], ["关联规则中衡量项集出现频繁程度的指标是____。", "支持度"], ["线性回归常用____估计参数。", "最小二乘法"], ["神经网络训练中，从输入到输出计算预测结果的过程称为____。", "前向传播"], ["自助采样的英文常称为____。", "Bootstrap"], ["把连续属性划分为有限区间的过程称为____。", "离散化"]], "judge": [["数据分析主要回答“发生了什么、为什么发生”，数据挖掘更强调发现潜在规律和预测。", "对"], ["聚类算法需要事先给出每个样本的类别标签。", "错"], ["Z-score标准化会把所有数据缩放到[0,1]。", "错"], ["频繁项集只需满足最小支持度，强关联规则还要考虑置信度等指标。", "对"], ["KNN训练阶段通常主要保存训练样本，因此常被称为惰性学习。", "对"], ["SVM中的支持向量通常是远离分类边界、完全不起作用的样本。", "错"], ["学习率过大可能导致神经网络训练不稳定甚至发散。", "对"], ["PCA属于数据规约中的降维方法。", "对"], ["训练集和测试集表现都很差通常是过拟合。", "错"], ["皮尔逊相关系数主要衡量线性相关关系。", "对"]], "short": ["结合例子说明数据分析与数据挖掘的区别和联系。", "简述数据预处理在数据挖掘中的地位、主要任务和作用。", "说明K-means算法的基本思想、主要步骤、优点和局限性。"]};
function nrm(s) { return (s||"").toString().trim().replace(/\s+/g,"").toLowerCase(); }
function setfb(el, cls, html) { const f=el.querySelector(".fb"); f.className="fb "+cls; f.innerHTML=html; }
document.querySelector("#single").innerHTML = data.single.map((q,i)=>`<div class="q" data-t="s" data-i="${i}"><div class="qt">${i+1}. ${q[0]} <small>(2分)</small></div>${q[1].map((o,j)=>`<label><input type="radio" name="s${i}" value="${String.fromCharCode(65+j)}"> ${String.fromCharCode(65+j)}. ${o}</label>`).join("")}<div class="fb"></div></div>`).join("");
document.querySelector("#blank").innerHTML = data.blank.map((q,i)=>`<div class="q" data-t="b" data-i="${i}"><div class="qt">${i+1}. ${q[0]} <small>(2分)</small></div><input type="text" name="b${i}"><div class="fb"></div></div>`).join("");
document.querySelector("#judge").innerHTML = data.judge.map((q,i)=>`<div class="q" data-t="j" data-i="${i}"><div class="qt">${i+1}. ${q[0]}（ ） <small>(1分)</small></div><label><input type="radio" name="j${i}" value="对"> 对</label><label><input type="radio" name="j${i}" value="错"> 错</label><div class="fb"></div></div>`).join("");
document.querySelector("#short").innerHTML = data.short.map((q,i)=>`<div class="q"><div class="qt">${i+1}. ${q} <small>(10分)</small></div><textarea placeholder="在这里作答"></textarea><div class="fb warn">简答题建议按“定义/思想 - 步骤或任务 - 作用 - 例子 - 总结”组织，交卷后请人工给分。</div></div>`).join("");
function grade() {
  let score=0,right=0,wrong=0;
  data.single.forEach((q,i)=>{ const el=document.querySelector(`[data-t=s][data-i="${i}"]`); const v=document.querySelector(`input[name=s${i}]:checked`)?.value||""; const ok=v===q[2]; if(ok){score+=2;right++;}else wrong++; setfb(el,ok?"ok":"bad",`答案：${q[2]}。你选：${v||"未作答"}。解析：本题考查“${q[0].replace("（ ）。","")}”相关概念，应抓关键词判断。`); });
  data.blank.forEach((q,i)=>{ const el=document.querySelector(`[data-t=b][data-i="${i}"]`); const v=document.querySelector(`input[name=b${i}]`).value; const ok=nrm(v)===nrm(q[1]); if(ok){score+=2;right++;}else wrong++; setfb(el,ok?"ok":"bad",`参考答案：${q[1]}。你填：${v||"未作答"}。`); });
  data.judge.forEach((q,i)=>{ const el=document.querySelector(`[data-t=j][data-i="${i}"]`); const v=document.querySelector(`input[name=j${i}]:checked`)?.value||""; const ok=v===q[1]; if(ok){score+=1;right++;}else wrong++; setfb(el,ok?"ok":"bad",`正确判断：${q[1]}。你选：${v||"未作答"}。`); });
  document.querySelector("#score").textContent=score; document.querySelector("#right").textContent=right; document.querySelector("#wrong").textContent=wrong; scrollTo({top:0,behavior:"smooth"});
}
function reveal() { grade(); }
</script>
</body>
</html>
