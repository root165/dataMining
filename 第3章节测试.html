<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>第3章节测试：数据准备：收集、抽样、集成、清理、规约与变换</title>
  <style>
    :root { --ink:#172033; --muted:#5f6f85; --line:#d8e2ee; --bg:#f6f8fb; --panel:#fff; --blue:#2563eb; --green:#166534; --red:#b91c1c; --amber:#92400e; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif; background:var(--bg); color:var(--ink); line-height:1.65; }
    header { position:sticky; top:0; z-index:5; background:rgba(255,255,255,.96); border-bottom:1px solid var(--line); backdrop-filter:blur(8px); }
    .bar, main { max-width:980px; margin:0 auto; }
    .bar { padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    h1 { margin:0; font-size:22px; }
    main { padding:18px 18px 42px; }
    button { border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:6px; padding:8px 12px; cursor:pointer; font:inherit; }
    button.primary { background:var(--blue); border-color:var(--blue); color:#fff; }
    .score { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
    .score div, section { background:var(--panel); border:1px solid var(--line); border-radius:8px; }
    .score div { padding:10px; text-align:center; }
    .score strong { display:block; font-size:22px; }
    section { padding:18px; margin-bottom:16px; }
    .note { color:var(--muted); margin-top:0; }
    .q { padding:15px 0; border-top:1px solid var(--line); }
    .q:first-child { border-top:0; padding-top:0; }
    .qt { font-weight:700; margin-bottom:8px; }
    .tag { display:inline-block; margin-left:6px; color:#334155; background:#eef4ff; border:1px solid #dbeafe; border-radius:999px; padding:1px 8px; font-size:12px; font-weight:400; }
    label { display:block; padding:6px 8px; border-radius:6px; }
    label:hover { background:#eef4ff; }
    input[type=text], textarea { width:100%; border:1px solid var(--line); border-radius:6px; padding:9px 10px; font:inherit; background:#fff; }
    textarea { min-height:128px; resize:vertical; }
    .fb { display:none; margin-top:10px; border-radius:6px; padding:10px 12px; font-size:14px; }
    .ok { display:block; background:#ecfdf3; color:var(--green); }
    .bad { display:block; background:#fef2f2; color:var(--red); }
    .warn { display:block; background:#fff7ed; color:var(--amber); }
    @media (max-width:700px) { .score { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<header>
  <div class="bar">
    <h1>第3章节测试：数据准备：收集、抽样、集成、清理、规约与变换</h1>
    <div>
      <button class="primary" onclick="grade()">交卷纠错</button>
      <button onclick="reveal()">显示解析</button>
      <button onclick="resetAll()">清空</button>
    </div>
  </div>
</header>
<main>
  <div class="score">
    <div><strong id="score">0</strong>客观题得分</div>
    <div><strong id="right">0</strong>正确</div>
    <div><strong id="wrong">0</strong>待改</div>
  </div>
  <section>
    <p class="note">答题后会显示解析，并指出本题重点关注的知识点。简答题提供参考要点，请按要点自查。</p>
    <div id="questions"></div>
  </section>
</main>
<script>
const questions = [{"type": "single", "q": "分层抽样最适合哪类总体？", "options": ["层内同质、层间异质", "层内异质、层间同质", "完全没有分层结构", "只能用于时间序列"], "answer": "A", "focus": "抽样方法对比", "explain": "图片与docx均强调分层抽样适用于层内同质、层间异质。"}, {"type": "single", "q": "Min-Max归一化的结果通常映射到哪个区间？", "options": ["[-1,1]", "[0,1]", "均值0标准差1", "任意类别标签"], "answer": "B", "focus": "归一化", "explain": "复习大纲明确归一化将数据映射到[0,1]区间。"}, {"type": "blank", "q": "正态分布下3σ原则的正常数据区间为[μ-3σ, ____]。", "answer": "μ+3σ", "focus": "异常值检测", "explain": "区间外的数据可作为异常值识别对象。"}, {"type": "judge", "q": "哈希编码适合高基数属性，但可能出现哈希冲突。", "answer": "对", "focus": "编码方法", "explain": "这是docx和图片OCR共同列出的重点。"}, {"type": "short", "q": "比较分层抽样与整群抽样的差异。", "answer": "要点：分层先分层，每层都抽，目标是提高精度，要求层内同质、层间异质；整群先分群，抽若干群并调查群内个体，目标是降低成本，要求群内异质、群间同质。", "focus": "抽样方法横向对比"}, {"type": "single", "q": "系统抽样的主要风险是？", "options": ["无法抽样", "数据存在周期性时可能产生偏差", "只能用于文本", "一定比所有方法精度高"], "answer": "B", "focus": "系统抽样", "explain": "图片OCR指出若数据存在周期性模式，系统抽样可能导致样本偏差。"}, {"type": "single", "q": "数据联邦的核心特点是？", "options": ["实际复制全部数据", "提供虚拟化集成视图", "只能离线批处理", "完全不需要元数据"], "answer": "B", "focus": "数据联邦", "explain": "数据联邦不实际保存/迁移数据，而是提供虚拟化集成视图。"}, {"type": "single", "q": "数据仓库相对数据联邦的常见特点是？", "options": ["查询快但实时性较差", "完全不存储数据", "只能查实时源", "不支持历史趋势分析"], "answer": "A", "focus": "集成技术对比", "explain": "图片OCR对比中数据仓库偏物理存储，查询快但实时性受周期限制。"}, {"type": "single", "q": "Z-score标准化后的数据通常具有什么特征？", "options": ["均值0、标准差1", "全部落在[0,1]", "全部变成类别", "删除异常值"], "answer": "A", "focus": "标准化", "explain": "Z-score标准化使数据均值为0、标准差为1。"}, {"type": "single", "q": "离散化主要是把什么变成有限区间或类别？", "options": ["连续数值", "文件名", "算法代码", "训练标签"], "answer": "A", "focus": "离散化", "explain": "离散化也叫分箱，是把连续数值映射到有限区间或类别标签。"}, {"type": "judge", "q": "整群抽样通常用于群内异质、群间同质的总体。", "answer": "对", "focus": "整群抽样", "explain": "图片OCR明确整群抽样适用于群内异质、群间同质。"}, {"type": "judge", "q": "数据挖掘抽样主要是因为处理全样本的计算成本可能过高。", "answer": "对", "focus": "抽样本质", "explain": "图片OCR区分统计学抽样和数据挖掘抽样的目的。"}, {"type": "judge", "q": "PCA降维后的主成分含义通常比原始变量更直观清楚。", "answer": "错", "focus": "PCA", "explain": "docx明确主成分含义通常更模糊/抽象。"}, {"type": "blank", "q": "四分位极差IQR等于Q3减____。", "answer": "Q1", "focus": "IQR异常检测", "explain": "IQR=Q3-Q1。"}, {"type": "blank", "q": "数据集成难点中，各数据源可独立变更且不通知集成系统，体现的是____性。", "answer": "自治", "focus": "数据集成难点", "explain": "docx和图片OCR均强调自治性对鲁棒性提出要求。"}, {"type": "short", "q": "说明为什么数据挖掘前必须进行异常值检测和清洗。", "answer": "异常值可能来自噪声、录入错误或特殊样本，会导致模型失真、影响参数和距离计算、降低算法稳定性。清洗可提高数据质量、模型准确性和可解释性。", "focus": "异常值清洗"}, {"type": "single", "q": "下列哪项属于数据清洗？", "options": ["处理缺失值", "生成FP树", "计算提升度", "选择最大间隔超平面"], "answer": "A", "focus": "数据清洗", "explain": "数据清洗处理缺失值、噪声、异常值、重复和不一致数据。"}, {"type": "single", "q": "下列哪项属于数据规约？", "options": ["PCA降维", "置信度计算", "决策树剪枝", "支持向量选择"], "answer": "A", "focus": "数据规约", "explain": "期末大纲把降维、PCA等列为数据规约。"}, {"type": "judge", "q": "数据集成时可能遇到同名异义、别名或表达形式不一致等实体识别冲突。", "answer": "对", "focus": "实体识别冲突", "explain": "docx明确列出实体识别冲突示例。"}, {"type": "blank", "q": "数据预处理主要任务包括清洗、集成、变换和数据____。", "answer": "规约", "focus": "数据预处理任务", "explain": "期末大纲PDF列出四类主要任务。"}];
function normalize(s) { return (s || "").toString().trim().replace(/\s+/g, "").toLowerCase(); }
function optionLetter(i) { return String.fromCharCode(65 + i); }
function render() {
  const box = document.querySelector("#questions");
  box.innerHTML = questions.map((q, i) => {
    const idx = i + 1;
    const tag = `<span class="tag">重点：${q.focus}</span>`;
    if (q.type === "single") {
      return `<div class="q" data-i="${i}"><div class="qt">${idx}. ${q.q} ${tag}</div>${q.options.map((o,j)=>`<label><input type="radio" name="q${i}" value="${optionLetter(j)}"> ${optionLetter(j)}. ${o}</label>`).join("")}<div class="fb"></div></div>`;
    }
    if (q.type === "judge") {
      return `<div class="q" data-i="${i}"><div class="qt">${idx}. ${q.q}（ ） ${tag}</div><label><input type="radio" name="q${i}" value="对"> 对</label><label><input type="radio" name="q${i}" value="错"> 错</label><div class="fb"></div></div>`;
    }
    if (q.type === "blank") {
      return `<div class="q" data-i="${i}"><div class="qt">${idx}. ${q.q} ${tag}</div><input type="text" name="q${i}"><div class="fb"></div></div>`;
    }
    return `<div class="q" data-i="${i}"><div class="qt">${idx}. ${q.q} ${tag}</div><textarea name="q${i}" placeholder="在这里作答"></textarea><div class="fb warn">参考要点：${q.answer}<br>重点关注：${q.focus}</div></div>`;
  }).join("");
}
function setFeedback(i, ok, text) {
  const fb = document.querySelector(`[data-i="${i}"] .fb`);
  fb.className = "fb " + (ok ? "ok" : "bad");
  fb.innerHTML = text;
}
function grade() {
  let score = 0, right = 0, wrong = 0;
  questions.forEach((q, i) => {
    if (q.type === "short") {
      const fb = document.querySelector(`[data-i="${i}"] .fb`);
      fb.style.display = "block";
      return;
    }
    let value = "";
    if (q.type === "blank") value = document.querySelector(`[name="q${i}"]`).value;
    else value = document.querySelector(`[name="q${i}"]:checked`)?.value || "";
    const ok = normalize(value) === normalize(q.answer);
    if (ok) { score += q.type === "judge" ? 1 : 2; right++; } else wrong++;
    setFeedback(i, ok, `答案：${q.answer}。你的答案：${value || "未作答"}。<br>解析：${q.explain}<br>重点关注：${q.focus}`);
  });
  document.querySelector("#score").textContent = score;
  document.querySelector("#right").textContent = right;
  document.querySelector("#wrong").textContent = wrong;
  scrollTo({ top: 0, behavior: "smooth" });
}
function reveal() {
  questions.forEach((q, i) => {
    if (q.type === "short") {
      const fb = document.querySelector(`[data-i="${i}"] .fb`);
      fb.style.display = "block";
    } else {
      setFeedback(i, true, `答案：${q.answer}。<br>解析：${q.explain}<br>重点关注：${q.focus}`);
    }
  });
}
function resetAll() { document.querySelectorAll("input, textarea").forEach(el => { if (el.type === "radio") el.checked = false; else el.value = ""; }); document.querySelectorAll(".fb").forEach(el => { el.className = "fb"; el.innerHTML = ""; }); document.querySelector("#score").textContent = "0"; document.querySelector("#right").textContent = "0"; document.querySelector("#wrong").textContent = "0"; }
render();
</script>
</body>
</html>
